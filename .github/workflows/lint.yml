name: Lint

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - next
  push:
    branches:
      - main
      - next

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      root: ${{ steps.filter.outputs.root }}
      api: ${{ steps.filter.outputs.api }}
      admin: ${{ steps.filter.outputs.admin }}
      site: ${{ steps.filter.outputs.site }}
      create-app: ${{ steps.filter.outputs.create-app }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            root:
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - '.prettierrc'
              - '.prettierignore'
              - '.cspell.json'
              - '.cspellignore'
              - 'site-configs/**'
              - 'setup-project-files.js'
              - '.github/workflows/lint.yml'
            api:
              - 'api/**'
            admin:
              - 'admin/**'
            site:
              - 'site/**'
              - 'site-configs/**'
            create-app:
              - 'create-app/**'

  lint-root:
    name: Lint Root
    needs: changes
    if: ${{ needs.changes.outputs.root == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-environment

      - name: Setup project for CI run
        run: npm run setup:ci

      - name: Lint
        run: npm run lint:ci

  lint-api:
    name: Lint API
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/lint-package.yml
    with:
      package: api

  lint-admin:
    name: Lint Admin
    needs: changes
    if: ${{ needs.changes.outputs.admin == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/lint-package.yml
    with:
      package: admin
      setup-ci: true

  lint-site:
    name: Lint Site
    needs: changes
    if: ${{ needs.changes.outputs.site == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/lint-package.yml
    with:
      package: site
      setup-ci: true

  lint-create-app:
    name: Lint Create App
    needs: changes
    if: ${{ needs.changes.outputs.create-app == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/lint-package.yml
    with:
      package: create-app
      lint-command: lint
