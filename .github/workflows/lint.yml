name: Lint

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - next
  push:
    branches:
      - main
      - next

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - run: echo "${{ github.actor }}"

      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm run lint:ci && pnpm --dir api run lint:ci && pnpm --dir admin run lint:ci && pnpm --dir site run lint:ci && pnpm --dir create-app run lint

      - name: Build
        run: pnpm run build && pnpm --dir create-app run build
