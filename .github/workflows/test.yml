name: Test

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - next
  push:
    branches:
      - main
      - next

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - '.github/workflows/test.yml'

  test:
    name: Test API
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-environment
        with:
          packages: api

      - name: Setup project for CI run
        run: npm run setup:ci

      - name: Test
        run: npm run test:ci

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: test-results
          path: "**/junit.xml"
